name: Publish scaffold to npm

on:
  push:
    tags:
      - 'v*'
      - '!mmr-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish scaffold
        # Uses npm trusted publishing via GitHub OIDC (configured in the npm
        # package settings — see https://www.npmjs.com/package/@zigrivers/scaffold/access).
        # No NODE_AUTH_TOKEN needed: the `id-token: write` permission above lets
        # npm sign the provenance statement AND authenticate the publish via OIDC.
        # See CLAUDE.md release section.
        run: npm publish --access public --provenance
