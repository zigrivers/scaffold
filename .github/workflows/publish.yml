name: Publish scaffold to npm

on:
  push:
    tags:
      - 'v*'
      - '!mmr-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish scaffold
        # Uses both OIDC (id-token: write above, for provenance signing) AND a
        # legacy NPM_TOKEN secret (for registry auth). Earlier attempt at pure
        # OIDC failed with npm 404 in v3.28.0 (PR #360); the trusted-publisher
        # config on the npm side wasn't authorizing publishes despite accepting
        # the OIDC token for provenance signing. NPM_TOKEN remains the working
        # auth path. Rotate the secret when it nears its 30-day default expiry.
        # See CLAUDE.md release section.
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
