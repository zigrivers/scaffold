name: Update Homebrew Formula

on:
  push:
    tags:
      - 'v*'

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download source tarball and compute SHA256
        id: sha
        run: |
          curl -sL "https://github.com/zigrivers/scaffold/archive/refs/tags/v${{ steps.tag.outputs.version }}.tar.gz" -o source.tar.gz
          echo "sha256=$(sha256sum source.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: zigrivers/homebrew-scaffold
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          cat > Formula/scaffold.rb << 'FORMULA'
          class Scaffold < Formula
            desc "AI-powered software project scaffolding pipeline"
            homepage "https://github.com/zigrivers/scaffold"
            url "https://github.com/zigrivers/scaffold/archive/refs/tags/v${{ steps.tag.outputs.version }}.tar.gz"
            sha256 "${{ steps.sha.outputs.sha256 }}"
            license "MIT"

            depends_on "node"

            def install
              system "npm", "install", *Language::Node.std_npm_install_args(libexec)
              bin.install_symlink Dir["#{libexec}/bin/*"]
            end

            test do
              assert_match "scaffold", shell_output("#{bin}/scaffold --version")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/scaffold.rb
          git commit -m "Update scaffold to v${{ steps.tag.outputs.version }}"
          git push
