name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          # 18.17+ required by undici@^6 (introduced for the
          # knowledge-freshness audit's pinned-IP fetch). The repo's runtime
          # already needs 18.17+ to satisfy that range; pinning CI to '18'
          # would resolve to the latest 18.x which is fine, but we make it
          # explicit so a regression doesn't sneak in.
          node-version: '18.17'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq
          sudo npm install -g bats

      - name: Install npm dependencies
        run: npm ci

      - name: Run all quality gates
        run: make check-all

      - name: Validate knowledge frontmatter
        run: make validate-knowledge

      - name: Guides drift + security gate
        run: make guides-check
