name: Knowledge Freshness Version Bump

# Auto-bumps content/knowledge/VERSION whenever a knowledge-freshness PR is
# squash-merged to main. The bump kind is derived from the PR title/body
# (Conventional Commits flavored):
#
#   BREAKING CHANGE: anywhere in title or body → major
#   feat(knowledge): or feat(knowledge-freshness): title prefix → minor
#   chore(knowledge): or chore(knowledge-freshness): title prefix → patch
#   anything else → patch (with a ::notice:: surfaced in the logs)
#
# The bump commit lands on main with the prefix `chore(knowledge):` (NOT
# `knowledge-freshness/`-style) so it does NOT itself trigger another
# freshness-PR workflow.

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency: knowledge-freshness-version-bump

jobs:
  bump:
    # Run only on merged PRs whose source branch was `knowledge-freshness/...`
    # or which carry the `knowledge-freshness` label. (Closed-without-merge
    # PRs and unrelated PRs are skipped.)
    if: >-
      github.event.pull_request.merged == true &&
      (
        startsWith(github.event.pull_request.head.ref, 'knowledge-freshness/') ||
        contains(github.event.pull_request.labels.*.name, 'knowledge-freshness')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18.17'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Configure git identity
        run: |
          git config user.name "knowledge-freshness-bot"
          git config user.email "knowledge-freshness@users.noreply.github.com"

      - name: Compute and apply VERSION bump
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          VERSION_FILE="content/knowledge/VERSION"

          # Compute the catch-up count and the bump against the SAME main we push
          # onto, retrying if a concurrent merge advances main in between. This
          # single global concurrency group means a rapid batch of refresh PRs
          # cancels the intermediate (pending) bump runs, so a surviving run owes
          # one patch bump per un-bumped refresh commit, not just one. Recomputing
          # COUNT on the latest main each attempt (instead of computing once then
          # rebasing the commit onto a newer main) closes the race where a PR that
          # merges mid-run would otherwise never increment VERSION. The CLI derives
          # the bump KIND from this PR's title/body (single source of truth) and
          # applies COUNT as a patch multiplier (ignored for minor/major); minor/
          # major knowledge PRs are deliberate and merge individually, so they
          # aren't part of the batches that need catch-up.
          for attempt in 1 2 3; do
            git fetch --quiet origin
            git reset --hard origin/main   # discard any prior attempt; start on latest main
            CURRENT=$(tr -d '[:space:]' < "$VERSION_FILE")
            echo "attempt $attempt — current VERSION: $CURRENT"

            LAST_BUMP=$(git log -1 --format=%H -F --grep='chore(knowledge): bump KB VERSION' HEAD 2>/dev/null || true)
            # Guard a LAST_BUMP not reachable in this clone (shouldn't happen —
            # checkout is fetch-depth: 0 — but never let a bad range abort).
            if [ -n "$LAST_BUMP" ] && ! git cat-file -e "${LAST_BUMP}^{commit}" 2>/dev/null; then
              echo "::warning::last bump commit $LAST_BUMP unreachable; treating as first bump"
              LAST_BUMP=""
            fi

            # Compute NEXT by REPLAYING the per-commit bump kind of every un-bumped
            # refresh commit since the last bump (NUL-separated %B → the CLI applies
            # deriveBumpKind to each and folds with bumpSemver). This is correct for
            # a mixed batch — a feat (minor) resets patch, later chores add to it —
            # and an empty range yields NEXT==current, caught by the diff guard below
            # (so a prior run that already caught up doesn't over-bump). No prior bump
            # commit (first bump ever) → single derivation from this PR.
            if [ -n "$LAST_BUMP" ]; then
              OUTPUT=$(git log -z --format=%B "${LAST_BUMP}..HEAD" -- content/knowledge/ ':(exclude)content/knowledge/VERSION' \
                | node dist/index.js knowledge-freshness bump-version --replay-stdin --title "$PR_TITLE" --body "$PR_BODY")
            else
              OUTPUT=$(node dist/index.js knowledge-freshness bump-version --title "$PR_TITLE" --body "$PR_BODY")
            fi
            echo "$OUTPUT"
            NEXT=$(printf '%s\n' "$OUTPUT" | awk '/^next:/ {print $2}')
            if [ -z "$NEXT" ]; then
              echo "::error::failed to parse next version from CLI output"
              exit 1
            fi

            # Surface an unrecognized PR-title prefix (each commit's kind is derived
            # by the CLI; this is just a heads-up for reviewers).
            case "$PR_TITLE" in
              *"BREAKING CHANGE:"*|"feat(knowledge):"*|"feat(knowledge-freshness):"*|"chore(knowledge):"*|"chore(knowledge-freshness):"*) ;;
              *) echo "::notice::unrecognized prefix in PR title: $PR_TITLE" ;;
            esac

            printf '%s\n' "$NEXT" > "$VERSION_FILE"
            git add "$VERSION_FILE"
            if git diff --cached --quiet; then
              echo "::notice::VERSION already at $NEXT — nothing to bump"
              exit 0
            fi

            # NOTE: commit prefix is `chore(knowledge):` (NOT
            # `knowledge-freshness/`-shaped). This workflow's filter checks the
            # source BRANCH, and the push goes straight to main without such a
            # branch, so this is belt-and-braces against accidental recursion.
            git commit -m "chore(knowledge): bump KB VERSION to $NEXT"
            # Fast-forward-only push: succeeds only if main is still at the commit
            # we replayed against. If a concurrent merge advanced main, the push is
            # rejected and we loop — re-replaying so the racing commit's bump is
            # also applied (rather than rebasing past it and losing its bump).
            if git push origin HEAD:main; then
              echo "pushed KB VERSION $NEXT"
              exit 0
            fi
            echo "::notice::main advanced during bump (attempt $attempt) — recomputing"
          done
          echo "::error::could not push KB VERSION bump after 3 attempts (main kept advancing)"
          exit 1
