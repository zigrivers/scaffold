name: Knowledge Freshness Audit

# Daily grounded audit of the knowledge base.
#
# Each run:
#   1. Pre-filters at most 10 entries that are due for a check (cadence + source hash).
#   2. For each candidate, runs `audit-run-entry` to produce a verdict.
#   3. If the verdict is `major-drift` or `superseded`, applies the verdict and
#      opens a PR with the rendered findings table.
#
# MMR corroboration is intentionally NOT wired into this Phase 2 workflow. Task 11
# will add it as a separate CI gate that fires on the freshness PR's pushed branch,
# where the MMR CLI + channel auth context is straightforward.
#
# Note on the gate workflow visibility (F-003): GitHub suppresses workflow events
# triggered by the default `GITHUB_TOKEN`, so the freshness-PR gate workflow
# (knowledge-freshness-gates.yml) would NOT fire on PRs this cron opens unless
# we switch to a PAT/App token. To keep the trust boundary minimal, this workflow
# runs the SAME gate logic inline before calling `audit-apply --open-pr`; any
# gate failure skips PR creation. The gate workflow remains the source of truth
# for human-opened freshness PRs (which `GITHUB_TOKEN` does NOT suppress).

on:
  schedule:
    # 09:00 UTC daily. Choose UTC so the schedule is unaffected by DST.
    - cron: '0 9 * * *'
  workflow_dispatch:

# Prevent two scheduled runs from racing (e.g. a manual dispatch firing while
# the cron is still working through candidates).
concurrency: knowledge-freshness-audit

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          # full history needed so we can branch off origin/main without
          # the shallow-clone fetch dance.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18.17'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Configure git identity
        # Required for `git commit` inside `audit-apply --open-pr`.
        run: |
          git config user.name "knowledge-freshness-bot"
          git config user.email "knowledge-freshness@users.noreply.github.com"

      - name: Pre-filter candidates
        run: node dist/index.js knowledge-freshness audit-prefilter --max=10 > /tmp/candidates.json

      - name: Run audits and open PRs
        env:
          # The cron uses the Z.ai (GLM) HTTP provider as PRIMARY for content
          # research, with DeepSeek as a PER-ENTRY fallback: each candidate
          # tries Z.ai first and only drops to DeepSeek if that call fails
          # (transport error, timeout, rate-limit, empty response). See
          # docs/knowledge-freshness/operations.md §4 "Choosing a provider"
          # for the precedence + fallback rules. ZAI_API_KEY (primary) is
          # REQUIRED — the preflight below fails the run without it.
          # DEEPSEEK_API_KEY (fallback) is recommended but optional: without
          # it the run still works and just loses the fallback safety net
          # (the preflight warns and disables the fallback).
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          KNOWLEDGE_FRESHNESS_PROVIDER: zai
          KNOWLEDGE_FRESHNESS_FALLBACK_PROVIDER: deepseek
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Preflight: surface a missing ZAI_API_KEY immediately instead of
          # letting every per-candidate dispatch fail in the per-entry
          # try/catch — that path exits 0 with zero PRs opened, the same
          # silent failure mode this provider switch is meant to eliminate
          # (PR #393 MMR F-001).
          if [ -z "${ZAI_API_KEY:-}" ]; then
            echo "::error::ZAI_API_KEY repository secret is required for the zai provider."
            echo "Run \`gh secret set ZAI_API_KEY\` and re-trigger the workflow."
            exit 1
          fi
          # The fallback is what makes a Z.ai outage non-fatal. Warn (don't
          # fail) if it's unconfigured — the run still works, just without a
          # safety net.
          if [ -z "${DEEPSEEK_API_KEY:-}" ]; then
            echo "::warning::DEEPSEEK_API_KEY is not set — the zai→deepseek fallback is disabled."
            echo "Run \`gh secret set DEEPSEEK_API_KEY\` to enable the fallback."
            unset KNOWLEDGE_FRESHNESS_FALLBACK_PROVIDER
          fi
          bash scripts/knowledge-freshness-audit-loop.sh /tmp/candidates.json
