name: Publish mmr to npm

on:
  push:
    tags:
      - 'mmr-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build mmr
        run: npm run build --workspace=packages/mmr

      - name: Test mmr
        run: npm test --workspace=packages/mmr

      - name: Publish mmr
        run: npm publish --access public --provenance --workspace=packages/mmr
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
