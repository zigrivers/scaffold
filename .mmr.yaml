# Transitional repo-local override: raises auth timeouts so the installed
# `mmr` CLI (Homebrew / npm-global) works immediately on this repo even
# when it's pinned to a version whose built-in defaults still have the
# too-tight 5s auth timeout.
#
# The authoritative fix lives in packages/mmr/src/config/defaults.ts
# (auth.timeout: 20 for claude and gemini). Once the next MMR release
# publishes and users pick it up, this file can be removed without
# behavior change for those users.
#
# MMR's config loader (packages/mmr/src/config/loader.ts deepMerge) merges
# this file into the built-in defaults recursively — it does NOT replace
# the entire `channels` map. Codex, Claude, and Gemini all stay enabled
# with their default commands/flags/env/auth recipes; only the fields
# explicitly set below are overridden.
#
# Why raise auth timeouts for claude and gemini specifically: their
# "auth check" commands (`claude -p 'respond with ok'` and
# `NO_BROWSER=true gemini -p 'respond with ok' -o json`) are full LLM
# round-trips that routinely take 9-14s in practice, well over the
# legacy 5s default. Codex's check (`codex login status`) is a local
# file probe and stays at the default.
channels:
  claude:
    auth:
      timeout: 20
  gemini:
    auth:
      timeout: 20

# Opt-in: file blocking MMR findings as Beads tasks (see content/tools/review-pr.md
# Step 7b and review-code.md Step 7b). Disabled by default. When enabled AND the
# project has a .beads/ directory, each blocking finding at-or-above `fix_threshold`
# becomes a bd-tracked bug with `--external-ref "mmr-<job-id>"`.
#
# beads:
#   create_issues_from_blocking_findings: false   # set true to enable
#   fix_threshold: P2                             # severity at-or-above to file
#   default_type: bug                             # bd create -t <type>
# Note: priority is always derived from the finding's severity (P0..P4), not configurable.
