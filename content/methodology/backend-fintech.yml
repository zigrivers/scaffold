    append: [backend-fintech-ledger, backend-fintech-data-modeling]
  api-contracts:
    append: [backend-fintech-order-lifecycle]
  security:
    append: [backend-fintech-compliance]
  operations:
    append: [backend-fintech-observability, backend-fintech-risk-management]
  tdd:
